<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Amazon → Pinterest</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0f0f;color:#f0ede8;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 16px 80px}
.header{text-align:center;margin-bottom:36px}
.logo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:12px}
.logo-amz{font-size:12px;font-weight:500;color:#ff9900;letter-spacing:2px;text-transform:uppercase}
.logo-p{width:34px;height:34px;border-radius:50%;background:#e60023;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;font-family:Georgia,serif}
h1{font-family:'Playfair Display',serif;font-size:clamp(24px,5vw,36px);font-weight:400;color:#f0ede8}
.sub{margin-top:6px;color:#555;font-size:13px}
.card{width:100%;max-width:560px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:14px;padding:22px;margin-bottom:16px}
.lbl{display:block;font-size:10px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:#555;margin-bottom:7px}
input,textarea{width:100%;background:#111;border:1px solid #2a2a2a;border-radius:9px;padding:12px 13px;font-family:'DM Sans',sans-serif;font-size:14px;color:#f0ede8;outline:none}
input:focus,textarea:focus{border-color:#e60023}
input::placeholder{color:#444}
textarea{resize:vertical;min-height:68px}
.field{margin-bottom:13px}
.btn-red{width:100%;padding:14px;background:#e60023;color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px}
.btn-red:hover{background:#cc0020}
.preview{width:100%;max-width:560px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:14px;overflow:hidden;margin-bottom:16px;animation:up 0.3s ease}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ph{padding:13px 18px;border-bottom:1px solid #2a2a2a;display:flex;align-items:center;gap:7px}
.ph-dot{width:7px;height:7px;border-radius:50%;background:#e60023}
.ph-lbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#555;font-weight:500}
.pin{display:flex}
.pin-img-wrap{width:170px;flex-shrink:0;background:#111;overflow:hidden;min-height:200px}
.pin-img-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.pin-no-img{width:100%;height:200px;display:flex;align-items:center;justify-content:center;color:#333;font-size:28px}
.pin-info{flex:1;padding:18px;display:flex;flex-direction:column;gap:7px}
.pin-brand{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#444}
.pin-price{font-size:20px;font-weight:600;color:#e60023}
.pin-desc{font-size:12px;color:#666;line-height:1.6}
.pin-src{font-size:11px;color:#444;margin-top:auto}
.enhance-wrap{padding:14px 18px;border-top:1px solid #2a2a2a;background:#111}
.enhance-title{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#555;margin-bottom:12px;font-weight:500}
.style-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.style-opt{padding:10px 6px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:12px;color:#888;cursor:pointer;text-align:center;transition:all 0.2s}
.style-opt.active{background:#e60023;border-color:#e60023;color:#fff}
.style-opt .icon{font-size:18px;display:block;margin-bottom:3px}
.btn-enhance{width:100%;padding:13px;background:linear-gradient(135deg,#e60023,#ff4d6d);color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer}
.btn-enhance:disabled{opacity:0.5;cursor:not-allowed}
.edit-wrap{padding:14px 18px;border-top:1px solid #2a2a2a}
.edit-inner{display:flex;flex-direction:column;gap:11px;padding-top:14px}
.canvas-wrap{width:100%;max-width:560px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:14px;overflow:hidden;margin-bottom:16px;animation:up 0.3s ease}
.canvas-wrap canvas{width:100%;height:auto;display:block}
.loading{display:flex;flex-direction:column;align-items:center;gap:12px;padding:48px 0;color:#555;font-size:13px}
.spin{width:26px;height:26px;border:2px solid #2a2a2a;border-top-color:#e60023;border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-sm{padding:10px;background:transparent;color:#555;border:1px solid #2a2a2a;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer}
.btn-sm:hover{border-color:#444;color:#888}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:11px 18px;border-radius:9px;font-size:13px;font-weight:500;z-index:99;white-space:nowrap;border:1px solid #4a1a22;background:#2b0d12;color:#ff6b7a;display:none}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <span class="logo-amz">Amazon</span>
    <span style="color:#444;font-size:16px">→</span>
    <div class="logo-p">P</div>
  </div>
  <h1>Amazon → Pinterest</h1>
  <p class="sub">Paste a link. AI designs your pin.</p>
</div>

<div class="card" id="formCard">
  <div class="field">
    <label class="lbl">Amazon Product URL</label>
    <input type="text" id="amazonUrl" placeholder="https://www.amazon.in/dp/... or amzn.to/..."/>
  </div>
  <button class="btn-red" id="extractBtn">Extract & Preview →</button>
</div>

<div id="loadingState" style="display:none">
  <div class="loading"><div class="spin"></div><span>Reading product…</span></div>
</div>

<div class="preview" id="previewCard" style="display:none">
  <div class="ph"><div class="ph-dot"></div><span class="ph-lbl">Pin Preview</span></div>
  <div class="pin">
    <div class="pin-img-wrap" id="pinImgWrap">
      <div class="pin-no-img" id="pinNoImg">📷</div>
    </div>
    <div class="pin-info">
      <div class="pin-brand" id="pinBrand" style="display:none"></div>
      <div id="pinTitle" style="font-family:'Playfair Display',serif;font-size:15px;line-height:1.3;color:#f0ede8;font-weight:400"></div>
      <div class="pin-price" id="pinPrice" style="display:none"></div>
      <div class="pin-desc" id="pinDesc"></div>
      <div class="pin-src">🔗 amazon.com</div>
    </div>
  </div>

  <div class="enhance-wrap">
    <div class="enhance-title">✨ AI Pin Designer — choose a style</div>
    <div class="style-grid">
      <button class="style-opt active" onclick="selectStyle('luxury',this)"><span class="icon">👑</span>Luxury</button>
      <button class="style-opt" onclick="selectStyle('bold',this)"><span class="icon">🔥</span>Bold Sale</button>
      <button class="style-opt" onclick="selectStyle('minimal',this)"><span class="icon">🤍</span>Minimal</button>
      <button class="style-opt" onclick="selectStyle('festive',this)"><span class="icon">🎉</span>Festive</button>
      <button class="style-opt" onclick="selectStyle('natural',this)"><span class="icon">🌿</span>Natural</button>
      <button class="style-opt" onclick="selectStyle('dark',this)"><span class="icon">🖤</span>Dark</button>
    </div>
    <button class="btn-enhance" id="enhanceBtn" onclick="enhanceImage()">✨ Design My Pin with AI</button>
  </div>

  <div class="edit-wrap" id="editPanel" style="display:none">
    <div class="edit-inner">
      <div class="field"><label class="lbl">Title</label><input type="text" id="eTitle"/></div>
      <div class="field"><label class="lbl">Price</label><input type="text" id="ePrice"/></div>
      <div class="field"><label class="lbl">Description</label><textarea id="eDesc" rows="3"></textarea></div>
      <div class="field"><label class="lbl">Image URL</label><input type="text" id="eImage"/></div>
    </div>
  </div>

  <div style="padding:14px 18px 18px;border-top:1px solid #2a2a2a">
    <button id="pinBtn" style="display:block;width:100%;padding:15px;margin-bottom:10px;background-color:#e60023;color:#fff;border:none;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif">📌 Save Original to Pinterest</button>
    <p style="font-size:11px;color:#444;text-align:center;margin-bottom:10px">Opens Pinterest pre-filled — just tap Save ✓</p>
    <div style="display:flex;gap:9px">
      <button class="btn-sm" id="editToggle" style="flex:1">✏️ Edit details</button>
      <button class="btn-sm" id="resetBtn">↩ New</button>
    </div>
  </div>
</div>

<!-- AI thinking -->
<div id="aiThinking" style="display:none">
  <div class="loading">
    <div class="spin"></div>
    <span id="aiMsg">Designing your pin…</span>
  </div>
</div>

<!-- Canvas result -->
<div class="canvas-wrap" id="canvasWrap" style="display:none">
  <div class="ph"><div class="ph-dot"></div><span class="ph-lbl">AI Designed Pin</span></div>
  <canvas id="pinCanvas"></canvas>
  <div style="padding:16px 18px 20px;border-top:1px solid #2a2a2a;display:flex;flex-direction:column;gap:10px">
    <button id="pinEnhancedBtn" style="display:block;width:100%;padding:15px;background-color:#e60023;color:#fff;border:none;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif">📌 Save Enhanced Pin to Pinterest</button>
    <p style="font-size:11px;color:#444;text-align:center">Uploading designed image → opening Pinterest…</p>
    <div style="display:flex;gap:9px">
      <button class="btn-sm" onclick="backToPreview()" style="flex:1">← Redesign</button>
      <button class="btn-sm" id="resetBtn2">↩ New product</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var product=null, showEdit=false, selectedStyle='luxury', canvasDataUrl='';

document.getElementById('extractBtn').addEventListener('click',extract);
document.getElementById('amazonUrl').addEventListener('keydown',function(e){if(e.key==='Enter')extract();});
document.getElementById('pinBtn').addEventListener('click',openOriginalPinterest);
document.getElementById('pinEnhancedBtn').addEventListener('click',openEnhancedPinterest);
document.getElementById('editToggle').addEventListener('click',toggleEdit);
document.getElementById('resetBtn').addEventListener('click',reset);
document.getElementById('resetBtn2').addEventListener('click',reset);
['eTitle','ePrice','eDesc','eImage'].forEach(function(id){
  document.getElementById(id).addEventListener('input',function(e){
    var map={eTitle:'title',ePrice:'price',eDesc:'description',eImage:'imageUrl'};
    product[map[id]]=e.target.value;
    if(id==='eImage') product.proxyImageUrl='/api/proxy-image?url='+encodeURIComponent(e.target.value);
    render();
  });
});

function selectStyle(style,btn){
  selectedStyle=style;
  document.querySelectorAll('.style-opt').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
}

async function extract(){
  var url=document.getElementById('amazonUrl').value.trim();
  if(!url) return;
  show('formCard',false); show('loadingState',true);
  try{
    var r=await fetch('/api/extract',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({amazonUrl:url})}).then(function(x){return x.json();});
    if(r.error) throw new Error(r.error);
    product=Object.assign({},r.product,{amazonUrl:url});
    render();
    show('loadingState',false); show('previewCard',true);
  }catch(e){
    show('loadingState',false); show('formCard',true);
    toast('❌ '+(e.message||'Could not extract product details'));
  }
}

function render(){
  var t=product.title||'(no title found)';
  document.getElementById('pinTitle').textContent=t;
  document.getElementById('pinDesc').textContent=product.description||'';
  var price=document.getElementById('pinPrice');
  if(product.price){price.textContent=product.price;price.style.display='';}else price.style.display='none';
  var brand=document.getElementById('pinBrand');
  if(product.brand){brand.textContent=product.brand;brand.style.display='';}else brand.style.display='none';
  var wrap=document.getElementById('pinImgWrap'),noImg=document.getElementById('pinNoImg');
  var src=product.proxyImageUrl||product.imageUrl;
  if(src){
    var img=wrap.querySelector('img');
    if(!img){img=document.createElement('img');wrap.appendChild(img);}
    img.src=src; img.alt=t; img.style.display='block';
    img.onerror=function(){img.style.display='none';noImg.style.display='flex';};
    noImg.style.display='none';
  }else{
    var img=wrap.querySelector('img');
    if(img) img.style.display='none';
    noImg.style.display='flex';
  }
  document.getElementById('eTitle').value=product.title||'';
  document.getElementById('ePrice').value=product.price||'';
  document.getElementById('eDesc').value=product.description||'';
  document.getElementById('eImage').value=product.imageUrl||'';
}

async function enhanceImage(){
  show('previewCard',false); show('aiThinking',true);
  var msgs=['Analyzing product style…','Choosing color palette…','Designing text overlays…','Adding visual effects…','Polishing your pin…'];
  var mi=0;
  var iv=setInterval(function(){mi=(mi+1)%msgs.length;document.getElementById('aiMsg').textContent=msgs[mi];},1200);
  try{
    var r=await fetch('/api/design-pin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:product.title,price:product.price,description:product.description,brand:product.brand,style:selectedStyle})}).then(function(x){return x.json();});
    clearInterval(iv);
    if(r.error) throw new Error(r.error);
    document.getElementById('aiMsg').textContent='Drawing pin…';
    await drawPin(r.design);
    show('aiThinking',false); show('canvasWrap',true);
  }catch(e){
    clearInterval(iv);
    show('aiThinking',false); show('previewCard',true);
    toast('❌ '+(e.message||'Design failed'));
  }
}

async function drawPin(design){
  var canvas=document.getElementById('pinCanvas');
  var ctx=canvas.getContext('2d');
  var W=800,H=1000;
  canvas.width=W; canvas.height=H;
  var bg=design.background||{type:'solid',color:'#1a1a1a'};
  if(bg.type==='gradient'){
    var grad=ctx.createLinearGradient(0,0,W,H);
    grad.addColorStop(0,bg.from||'#1a1a1a');
    grad.addColorStop(1,bg.to||'#0f0f0f');
    ctx.fillStyle=grad;
  }else{
    ctx.fillStyle=bg.color||'#1a1a1a';
  }
  ctx.fillRect(0,0,W,H);
  var src=product.proxyImageUrl||product.imageUrl;
  var imgH=580,imgY=0;
  if(src){
    try{
      var img=await loadImg(src);
      var scale=Math.max(W/img.width,imgH/img.height);
      var sw=img.width*scale,sh=img.height*scale;
      ctx.save();
      ctx.beginPath();
      ctx.rect(0,0,W,imgH);
      ctx.clip();
      ctx.drawImage(img,(W-sw)/2,(imgH-sh)/2,sw,sh);
      ctx.restore();
      // Overlay for text readability
      var igrad=ctx.createLinearGradient(0,imgH*0.4,0,imgH);
      igrad.addColorStop(0,'rgba(0,0,0,0)');
      igrad.addColorStop(1,'rgba(0,0,0,0.82)');
      ctx.fillStyle=igrad;
      ctx.fillRect(0,0,W,imgH);
    }catch(e){console.warn('img failed',e);}
  }
  var accent=design.accent||'#e60023';
  var textColor=design.text||'#ffffff';
  var y=imgH+36;
  // Brand badge
  if(product.brand&&design.showBrand){
    ctx.fillStyle=accent;
    var bw=ctx.measureText(product.brand.toUpperCase()).width+30;
    ctx.font='600 14px DM Sans,sans-serif';
    bw=ctx.measureText(product.brand.toUpperCase()).width+30;
    roundRect(ctx,40,y,bw,30,6); ctx.fill();
    ctx.fillStyle='#fff';
    ctx.fillText(product.brand.toUpperCase(),55,y+20);
    y+=48;
  }
  // Title
  var titleSize=design.titleFontSize||40;
  ctx.font=(design.titleWeight||'700')+' '+titleSize+'px DM Sans,sans-serif';
  ctx.fillStyle=textColor;
  var lines=wrapText(ctx,product.title||'',W-80,titleSize);
  lines.slice(0,3).forEach(function(line,i){ctx.fillText(line,40,y+(i+1)*(titleSize+4));});
  y+=lines.slice(0,3).length*(titleSize+8)+10;
  // Price
  if(product.price){
    var ps=design.priceFontSize||38;
    if(design.priceBadge){
      ctx.font='700 '+ps+'px DM Sans,sans-serif';
      var pw=ctx.measureText(product.price).width+44;
      ctx.fillStyle=accent;
      roundRect(ctx,40,y,pw,ps+20,10); ctx.fill();
      ctx.fillStyle='#fff';
      ctx.fillText(product.price,62,y+ps+4);
    }else{
      ctx.fillStyle=accent;
      ctx.font='700 '+ps+'px DM Sans,sans-serif';
      ctx.fillText(product.price,40,y+ps);
    }
    y+=ps+36;
  }
  // Tagline
  if(design.tagline){
    ctx.fillStyle=design.taglineColor||'rgba(255,255,255,0.6)';
    ctx.font='400 22px DM Sans,sans-serif';
    ctx.fillText(design.tagline,40,y);
    y+=40;
  }
  // CTA button
  if(design.ctaText){
    ctx.font='600 20px DM Sans,sans-serif';
    var ctaW=ctx.measureText(design.ctaText).width+60;
    ctx.fillStyle=accent;
    roundRect(ctx,40,y,ctaW,46,23); ctx.fill();
    ctx.fillStyle='#fff';
    ctx.fillText(design.ctaText,40+30,y+30);
  }
  canvasDataUrl=canvas.toDataURL('image/jpeg',0.92);
}

async function openEnhancedPinterest(){
  var btn=document.getElementById('pinEnhancedBtn');
  btn.disabled=true; btn.textContent='⏳ Uploading image…';
  try{
    // Upload canvas to imgbb
    var r=await fetch('/api/upload-image',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({base64:canvasDataUrl})}).then(function(x){return x.json();});
    if(r.error) throw new Error(r.error);
    var desc=[product.title,product.price,'Shop now on Amazon'].filter(Boolean).join(' — ');
    var p=new URLSearchParams({url:product.amazonUrl,title:product.title||'',description:desc,media:r.url});
    window.open('https://www.pinterest.com/pin/create/button/?'+p.toString(),'_blank');
  }catch(e){
    toast('❌ Upload failed: '+(e.message||'Check IMGBB_API_KEY in Render'));
  }finally{
    btn.disabled=false; btn.textContent='📌 Save Enhanced Pin to Pinterest';
  }
}

function openOriginalPinterest(){
  var desc=[product.title,product.price,product.description].filter(Boolean).join(' — ');
  var p=new URLSearchParams({url:product.amazonUrl,title:product.title||'',description:desc});
  if(product.imageUrl) p.set('media',product.imageUrl);
  window.open('https://www.pinterest.com/pin/create/button/?'+p.toString(),'_blank');
}

function loadImg(src){
  return new Promise(function(res,rej){
    var img=new Image(); img.crossOrigin='anonymous';
    img.onload=function(){res(img);}; img.onerror=function(){rej(new Error('failed'));};
    img.src=src;
  });
}
function wrapText(ctx,text,maxW,fontSize){
  ctx.font='700 '+fontSize+'px DM Sans,sans-serif';
  var words=text.split(' '),lines=[],line='';
  words.forEach(function(w){
    var test=line?line+' '+w:w;
    if(ctx.measureText(test).width>maxW){if(line)lines.push(line);line=w;}
    else line=test;
  });
  if(line) lines.push(line);
  return lines;
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}
function backToPreview(){show('canvasWrap',false);show('previewCard',true);}
function toggleEdit(){
  showEdit=!showEdit;
  document.getElementById('editPanel').style.display=showEdit?'block':'none';
  document.getElementById('editToggle').textContent=showEdit?'▲ Hide':'✏️ Edit details';
}
function reset(){
  product=null;showEdit=false;canvasDataUrl='';
  document.getElementById('amazonUrl').value='';
  document.getElementById('editPanel').style.display='none';
  show('previewCard',false);show('canvasWrap',false);show('formCard',true);
}
function show(id,v){document.getElementById(id).style.display=v?'':'none';}
var tt;
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.style.display='block';clearTimeout(tt);tt=setTimeout(function(){t.style.display='none';},5000);}
</script>
</body>
</html>
