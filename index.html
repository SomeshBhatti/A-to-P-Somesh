<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Amazon → Pinterest</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0f0f;color:#f0ede8;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 16px 80px}
.header{text-align:center;margin-bottom:36px}
.logo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:12px}
.logo-amz{font-size:12px;font-weight:500;color:#ff9900;letter-spacing:2px;text-transform:uppercase}
.logo-p{width:34px;height:34px;border-radius:50%;background:#e60023;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;font-family:Georgia,serif}
h1{font-family:'Playfair Display',serif;font-size:clamp(24px,5vw,36px);font-weight:400}
.sub{margin-top:6px;color:#555;font-size:13px}

.card{width:100%;max-width:560px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:14px;padding:22px;margin-bottom:16px}
.lbl{display:block;font-size:10px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:#555;margin-bottom:7px}
input,textarea{width:100%;background:#111;border:1px solid #2a2a2a;border-radius:9px;padding:12px 13px;font-family:'DM Sans',sans-serif;font-size:14px;color:#f0ede8;outline:none}
input:focus,textarea:focus{border-color:#e60023}
input::placeholder{color:#444}
textarea{resize:vertical;min-height:68px}
.field{margin-bottom:13px}

.btn-red{width:100%;padding:14px;background:#e60023;color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px}
.btn-red:hover{background:#cc0020}
.btn-red:disabled{opacity:0.4;cursor:not-allowed}

.preview{width:100%;max-width:560px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:14px;overflow:hidden;margin-bottom:16px;animation:up 0.3s ease}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ph{padding:13px 18px;border-bottom:1px solid #2a2a2a;display:flex;align-items:center;gap:7px}
.ph-dot{width:7px;height:7px;border-radius:50%;background:#e60023}
.ph-lbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#555;font-weight:500}

.pin{display:flex}
.pin-img{width:170px;flex-shrink:0;background:#111;overflow:hidden;min-height:170px}
.pin-img img{width:100%;height:100%;object-fit:cover;display:block}
.pin-no-img{width:100%;height:170px;display:flex;align-items:center;justify-content:center;color:#333;font-size:28px}
.pin-info{flex:1;padding:18px;display:flex;flex-direction:column;gap:7px}
.pin-brand{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#444}
.pin-title{font-family:'Playfair Display',serif;font-size:15px;line-height:1.3}
.pin-price{font-size:20px;font-weight:600;color:#e60023}
.pin-desc{font-size:12px;color:#666;line-height:1.6}
.pin-src{font-size:11px;color:#444;margin-top:auto}

.cta{padding:16px 18px;border-top:1px solid #2a2a2a;display:flex;flex-direction:column;gap:10px}
.pinterest-btn{width:100%;padding:15px;background:#e60023;color:#fff;border:none;border-radius:11px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.pinterest-btn:hover{background:#cc0020}
.hint{font-size:11px;color:#444;text-align:center}
.row{display:flex;gap:9px}
.btn-sm{flex:1;padding:10px;background:transparent;color:#555;border:1px solid #2a2a2a;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer}
.btn-sm:hover{border-color:#444;color:#888}

.edit-wrap{padding:0 18px 16px;border-top:1px solid #2a2a2a}
.edit-inner{padding-top:14px;display:flex;flex-direction:column;gap:11px}

.loading{display:flex;flex-direction:column;align-items:center;gap:12px;padding:48px 0;color:#555;font-size:13px}
.spin{width:26px;height:26px;border:2px solid #2a2a2a;border-top-color:#e60023;border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:11px 18px;border-radius:9px;font-size:13px;font-weight:500;z-index:99;white-space:nowrap;border:1px solid #4a1a22;background:#2b0d12;color:#ff6b7a;display:none}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <span class="logo-amz">Amazon</span>
    <span style="color:#444;font-size:16px">→</span>
    <div class="logo-p">P</div>
  </div>
  <h1>Amazon → Pinterest</h1>
  <p class="sub">Paste a link. One tap to pin it.</p>
</div>

<!-- Input form -->
<div class="card" id="formCard">
  <div class="field">
    <label class="lbl">Amazon Product URL</label>
    <input type="text" id="amazonUrl" placeholder="https://www.amazon.in/dp/... or amzn.to/..."/>
  </div>
  <button class="btn-red" id="extractBtn">Extract & Preview →</button>
</div>

<!-- Loading -->
<div id="loadingState" style="display:none">
  <div class="loading"><div class="spin"></div><span>Reading product…</span></div>
</div>

<!-- Preview -->
<div class="preview" id="previewCard" style="display:none">
  <div class="ph"><div class="ph-dot"></div><span class="ph-lbl">Pin Preview</span></div>

  <div class="pin">
    <div class="pin-img" id="pinImgWrap">
      <div class="pin-no-img" id="pinNoImg">📷</div>
    </div>
    <div class="pin-info">
      <div class="pin-brand" id="pinBrand" style="display:none"></div>
      <div class="pin-title" id="pinTitle"></div>
      <div class="pin-price" id="pinPrice" style="display:none"></div>
      <div class="pin-desc" id="pinDesc"></div>
      <div class="pin-src">🔗 amazon.com</div>
    </div>
  </div>

  <!-- Edit panel -->
  <div class="edit-wrap" id="editPanel" style="display:none">
    <div class="edit-inner">
      <div class="field"><label class="lbl">Title</label><input type="text" id="eTitle"/></div>
      <div class="field"><label class="lbl">Price</label><input type="text" id="ePrice"/></div>
      <div class="field"><label class="lbl">Description</label><textarea id="eDesc" rows="3"></textarea></div>
      <div class="field"><label class="lbl">Image URL</label><input type="text" id="eImage"/></div>
    </div>
  </div>

  <!-- Actions -->
  <div style="padding:16px 18px;border-top:1px solid #2a2a2a;display:block">
    <button id="pinBtn" style="display:block;width:100%;padding:18px;margin-bottom:10px;background-color:#e60023;color:#ffffff;border:0;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:sans-serif">
      📌 Save to Pinterest
    </button>
    <p style="font-size:11px;color:#444;text-align:center;margin-bottom:10px">Opens Pinterest pre-filled — just tap Save ✓</p>
    <div style="display:flex;gap:9px">
      <button class="btn-sm" id="editToggle" style="flex:1">✏️ Edit details</button>
      <button class="btn-sm" id="resetBtn">↩ New product</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var product = null;
var showEdit = false;

document.getElementById('extractBtn').addEventListener('click', extract);
document.getElementById('amazonUrl').addEventListener('keydown', function(e){ if(e.key==='Enter') extract(); });
document.getElementById('pinBtn').addEventListener('click', openPinterest);
document.getElementById('editToggle').addEventListener('click', toggleEdit);
document.getElementById('resetBtn').addEventListener('click', reset);
['eTitle','ePrice','eDesc','eImage'].forEach(function(id){
  document.getElementById(id).addEventListener('input', function(e){
    var map={eTitle:'title',ePrice:'price',eDesc:'description',eImage:'imageUrl'};
    product[map[id]]=e.target.value;
    if(id==='eImage') product.proxyImageUrl='/api/proxy-image?url='+encodeURIComponent(e.target.value);
    render();
  });
});

async function extract(){
  var url=document.getElementById('amazonUrl').value.trim();
  if(!url) return;
  show('formCard',false); show('loadingState',true);
  try{
    var r=await fetch('/api/extract',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({amazonUrl:url})}).then(function(x){return x.json();});
    if(r.error) throw new Error(r.error);
    product=Object.assign({},r.product,{amazonUrl:url});
    render();
    show('loadingState',false); show('previewCard',true);
  }catch(e){
    show('loadingState',false); show('formCard',true);
    toast('❌ '+(e.message||'Could not extract product details'));
  }
}

function getPinUrl(){
  if(!product) return '#';
  var desc=[product.title,product.price,product.description].filter(Boolean).join(' — ');
  var p=new URLSearchParams({url:product.amazonUrl,description:desc});
  if(product.imageUrl) p.set('media',product.imageUrl);
  return 'https://www.pinterest.com/pin/create/button/?'+p.toString();
}

function openPinterest(){
  var url=getPinUrl();
  window.open(url,'_blank');
}

function render(){
  document.getElementById('pinTitle').textContent=product.title||'';
  document.getElementById('pinDesc').textContent=product.description||'';
  var price=document.getElementById('pinPrice');
  if(product.price){price.textContent=product.price;price.style.display='';}else price.style.display='none';
  var brand=document.getElementById('pinBrand');
  if(product.brand){brand.textContent=product.brand;brand.style.display='';}else brand.style.display='none';
  var wrap=document.getElementById('pinImgWrap');
  var noImg=document.getElementById('pinNoImg');
  var src=product.proxyImageUrl||product.imageUrl;
  if(src){
    var img=wrap.querySelector('img');
    if(!img){img=document.createElement('img');wrap.appendChild(img);}
    img.src=src; img.alt=product.title; img.style.display='';
    img.onerror=function(){img.style.display='none';noImg.style.display='flex';};
    noImg.style.display='none';
  }else{
    var img=wrap.querySelector('img');
    if(img) img.style.display='none';
    noImg.style.display='flex';
  }
  document.getElementById('eTitle').value=product.title||'';
  document.getElementById('ePrice').value=product.price||'';
  document.getElementById('eDesc').value=product.description||'';
  document.getElementById('eImage').value=product.imageUrl||'';
}

function toggleEdit(){
  showEdit=!showEdit;
  document.getElementById('editPanel').style.display=showEdit?'block':'none';
  document.getElementById('editToggle').textContent=showEdit?'▲ Hide editor':'✏️ Edit details';
}

function reset(){
  product=null; showEdit=false;
  document.getElementById('amazonUrl').value='';
  document.getElementById('editPanel').style.display='none';
  document.getElementById('editToggle').textContent='✏️ Edit details';
  show('previewCard',false); show('formCard',true);
}

function show(id,v){ document.getElementById(id).style.display=v?'':'none'; }

var toastTimer;
function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.style.display='block';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){t.style.display='none';},4000);
}
</script>
</body>
</html>
