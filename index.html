<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Amazon to Pinterest</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08090a;--s1:#0f1012;--s2:#16181c;--s3:#1e2024;
  --bdr:#2a2d35;--bdr2:#343840;
  --tx:#f0f0f0;--mt:#6b7280;--sub:#4b5563;
  --acc:#6366f1;--acc2:#818cf8;
  --green:#22c55e;--red:#ef4444;--pin:#e60023;
}
body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;min-height:100vh}
.header{background:var(--s1);border-bottom:1px solid var(--bdr);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
.header-logo{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:700}
.header-logo-icon{width:30px;height:30px;background:var(--pin);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.main{max-width:800px;margin:0 auto;padding:24px 16px}
.input-card{background:var(--s1);border:1px solid var(--bdr);border-radius:14px;padding:24px;margin-bottom:20px}
.input-label{font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--mt);margin-bottom:8px;display:block}
.url-row{display:flex;gap:10px}
.url-input{flex:1;background:var(--bg);border:1px solid var(--bdr);border-radius:9px;padding:12px 16px;font-family:'Inter',sans-serif;font-size:14px;color:var(--tx);outline:none;transition:border-color 0.2s}
.url-input:focus{border-color:var(--acc)}
.url-input::placeholder{color:var(--sub)}
.btn-generate{padding:12px 24px;background:var(--pin);color:#fff;border:none;border-radius:9px;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;transition:opacity 0.2s}
.btn-generate:hover{opacity:0.9}
.btn-generate:disabled{opacity:0.45;cursor:not-allowed}
.steps{display:flex;gap:16px;margin-top:16px;flex-wrap:wrap}
.step{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--mt)}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--bdr2);flex-shrink:0;transition:all 0.3s}
.step.done .step-dot{background:var(--green)}
.step.active .step-dot{background:var(--pin);animation:pulse 1s ease infinite}
.step.done{color:var(--green)}.step.active{color:var(--pin)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.platform-card{background:var(--s1);border:1px solid var(--bdr);border-radius:14px;overflow:hidden;margin-bottom:16px}
.card-header{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bdr)}
.card-platform{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600}
.platform-dot{width:10px;height:10px;border-radius:50%;background:var(--pin);flex-shrink:0}
.card-actions{display:flex;gap:6px}
.btn-sm{padding:5px 10px;border-radius:6px;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--bdr);background:var(--s3);color:var(--mt);transition:all 0.2s}
.btn-sm:hover{color:var(--tx);border-color:var(--bdr2)}
.btn-sm.copied{background:#14532d;color:var(--green);border-color:#166534}
.card-body{padding:14px}
.card-title{font-size:14px;font-weight:700;color:var(--tx);margin-bottom:6px;line-height:1.3}
.card-text{font-size:12px;color:#aaa;line-height:1.7;margin-bottom:8px;white-space:pre-line;min-height:40px}
.card-text[contenteditable="true"]{outline:1px solid var(--pin);border-radius:4px;padding:4px;color:var(--tx)}
.card-hashtags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.hashtag{font-size:10px;padding:2px 7px;background:var(--s3);border-radius:4px;color:var(--acc2)}
.product-bar{background:var(--s2);border:1px solid var(--bdr);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;gap:12px;align-items:center}
.product-img-thumb{width:48px;height:48px;border-radius:8px;object-fit:cover;background:var(--bdr);flex-shrink:0}
.product-info{flex:1;min-width:0}
.product-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.product-meta{font-size:11px;color:var(--mt);margin-top:2px}
.product-price{font-size:16px;font-weight:700;color:var(--green);flex-shrink:0}
.loading-card{background:var(--s1);border:1px solid var(--bdr);border-radius:14px;padding:48px;text-align:center;margin-bottom:20px}
.loading-spinner{width:38px;height:38px;border:3px solid var(--bdr);border-top-color:var(--pin);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-msg{font-size:14px;color:var(--mt);margin-bottom:6px}
.loading-sub{font-size:12px;color:var(--sub)}
.empty{text-align:center;padding:60px 20px;color:var(--sub)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty h3{font-size:16px;color:var(--mt);font-weight:500;margin-bottom:6px}
.empty p{font-size:13px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;z-index:9999;display:none;white-space:nowrap;max-width:90vw}
.toast.ok{background:#14532d;color:var(--green);border:1px solid #166534}
.toast.err{background:#450a0a;color:var(--red);border:1px solid #7f1d1d}
.toast.info{background:var(--s3);color:var(--mt);border:1px solid var(--bdr)}
.btn-outline{padding:8px 16px;background:transparent;border:1px solid var(--bdr);border-radius:8px;color:var(--mt);font-family:'Inter',sans-serif;font-size:13px;cursor:pointer;transition:all 0.15s}
.btn-outline:hover{border-color:var(--bdr2);color:var(--tx)}
.action-buttons{display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;margin-top:16px}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">
    <div class="header-logo-icon">📌</div>
    Amazon to Pinterest
  </div>
</div>

<div class="main">

  <div class="input-card">
    <label class="input-label">Amazon Product URL</label>
    <div class="url-row">
      <input class="url-input" id="amazonUrl" type="text" placeholder="https://www.amazon.in/dp/... or amzn.to/..."/>
      <button class="btn-generate" id="generateBtn" onclick="generateContent()">🚀 Generate</button>
    </div>
    <div class="steps" id="steps" style="display:none">
      <div class="step" id="step1"><div class="step-dot"></div>Grok analyzing</div>
      <div class="step" id="step2"><div class="step-dot"></div>Gemini creating</div>
    </div>
  </div>

  <div class="product-bar" id="productBar" style="display:none">
    <img class="product-img-thumb" id="productImg" src="" alt="" onerror="this.style.display='none'"/>
    <div class="product-info">
      <div class="product-name" id="productName"></div>
      <div class="product-meta" id="productMeta"></div>
    </div>
    <div class="product-price" id="productPrice"></div>
  </div>

  <div class="loading-card" id="loadingCard" style="display:none">
    <div class="loading-spinner"></div>
    <div class="loading-msg" id="loadingMsg">Starting…</div>
    <div class="loading-sub">Takes 15-30 seconds</div>
  </div>

  <div id="resultsArea" style="display:none">
    <div class="platform-card" id="pinterestCard">
      <div class="card-header">
        <div class="card-platform"><div class="platform-dot"></div>Pinterest Pin</div>
        <div class="card-actions">
          <button class="btn-sm" onclick="toggleEdit('pin')">✏️ Edit</button>
          <button class="btn-sm" id="copyPin" onclick="copyContent()">📋 Copy</button>
        </div>
      </div>
      <div class="card-body">
        <div class="card-title" id="pinTitle">—</div>
        <div class="card-text" id="pinDesc" data-platform="pinterest">—</div>
        <div class="card-hashtags" id="pinTags"></div>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-outline" onclick="reset()">↩ New Product</button>
    </div>
  </div>

  <div class="empty" id="emptyState">
    <div class="empty-icon">⚡</div>
    <h3>Paste an Amazon URL above</h3>
    <p>Generate Pinterest-ready content in seconds</p>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
var currentPkg = null;
var currentUrl = '';
var editMode = false;

function setStep(n, state){ var el=document.getElementById('step'+n); if(el) el.className='step '+state; }
function resetSteps(){ for(var i=1;i<=2;i++) setStep(i,''); }

async function generateContent(){
  var url = document.getElementById('amazonUrl').value.trim();
  if(!url){ toast('Paste an Amazon URL first','err'); return; }
  currentUrl = url;

  document.getElementById('generateBtn').disabled = true;
  show('emptyState',false); show('resultsArea',false); show('productBar',false);
  show('loadingCard',true); show('steps',true);
  resetSteps();

  var stepMsgs = [
    'Grok analyzing product…',
    'Gemini creating Pinterest content…'
  ];
  var mi = 0;
  setStep(1,'active'); setMsg(stepMsgs[0]);
  var iv = setInterval(function(){
    setStep(mi+1,'done');
    mi = Math.min(mi+1, stepMsgs.length-1);
    setStep(mi+1,'active');
    setMsg(stepMsgs[mi]);
  }, 8000);

  try{
    var r = await fetch('/api/generate-content',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ amazonUrl: url, affiliateTag: '' })
    }).then(x=>x.json());

    clearInterval(iv);
    for(var i=1;i<=2;i++) setStep(i,'done');
    if(r.error) throw new Error(r.error);

    currentPkg = r;
    renderResults(r);
    show('loadingCard',false);
    show('resultsArea',true);
    toast('✅ Content ready!','ok');
  }catch(e){
    clearInterval(iv);
    show('loadingCard',false);
    show('emptyState',true);
    toast('❌ '+(e.message||'Generation failed'),'err');
  }
  document.getElementById('generateBtn').disabled = false;
}

function setMsg(m){ document.getElementById('loadingMsg').textContent = m; }

function renderResults(pkg){
  var p = pkg.product || {};
  
  if(p.title){
    document.getElementById('productImg').src = p.hostedImageUrl||p.imageUrl||'';
    document.getElementById('productImg').style.display = 'block';
    document.getElementById('productName').textContent = p.title;
    document.getElementById('productMeta').textContent = [p.brand, p.category].filter(Boolean).join(' · ');
    document.getElementById('productPrice').textContent = p.price||'';
    show('productBar',true);
  }

  var pin = pkg.pinterest||{};
  document.getElementById('pinTitle').textContent = pin.title||'—';
  document.getElementById('pinDesc').textContent = pin.description||'—';
  renderTags('pinTags', pin.hashtags||[]);
}

function renderTags(id, tags){
  document.getElementById(id).innerHTML = tags.slice(0,10).map(t=>'<span class="hashtag">#'+t+'</span>').join('');
}

function toggleEdit(){
  var el = document.getElementById('pinDesc');
  var isEditing = el.contentEditable === 'true';
  el.contentEditable = isEditing ? 'false' : 'true';
  if(!isEditing){ el.focus(); toast('Edit and click again to save','info'); }
  else{ toast('Saved ✓','ok'); }
}

function copyContent(){
  if(!currentPkg) return;
  var pin = currentPkg.pinterest||{};
  var text = [(pin.title||''), (pin.description||''), (pin.hashtags||[]).map(h=>'#'+h).join(' ')].filter(Boolean).join('\n\n');
  navigator.clipboard.writeText(text).then(function(){
    var btn = document.getElementById('copyPin');
    btn.textContent='✅ Copied!'; btn.classList.add('copied'); 
    setTimeout(()=>{btn.textContent='📋 Copy';btn.classList.remove('copied');},2000);
    toast('Content copied to clipboard!','ok');
  });
}

function reset(){
  currentPkg=null; currentUrl='';
  document.getElementById('amazonUrl').value='';
  show('resultsArea',false); show('productBar',false); show('loadingCard',false);
  show('emptyState',true); show('steps',false);
  resetSteps();
  var el=document.getElementById('pinDesc');
  if(el) el.contentEditable='false';
}

function show(id,v){ var el=document.getElementById(id); if(el) el.style.display=v?'':'none'; }
var toastTimer;
function toast(msg,type){
  var t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+(type||'info'); t.style.display='block';
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.style.display='none',3500);
}

document.getElementById('amazonUrl').addEventListener('keydown',function(e){ if(e.key==='Enter') generateContent(); });
</script>
</body>
</html>
