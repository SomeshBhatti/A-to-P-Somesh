<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amazon → Pinterest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f0f; --surface: #1a1a1a; --border: #2a2a2a;
      --text: #f0ede8; --muted: #666; --subtle: #444;
      --red: #e60023; --red-dark: #cc0020; --amazon: #ff9900; --green: #1db954;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 48px 16px 80px; }
    .header { text-align: center; margin-bottom: 48px; }
    .logo { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 14px; }
    .logo-amz { font-size: 13px; font-weight: 500; color: var(--amazon); letter-spacing: 2px; text-transform: uppercase; }
    .logo-arrow { color: var(--subtle); font-size: 18px; }
    .logo-p { width: 36px; height: 36px; border-radius: 50%; background: var(--red); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; color: #fff; font-family: Georgia, serif; }
    h1 { font-family: 'Playfair Display', serif; font-size: clamp(28px, 5vw, 40px); font-weight: 400; letter-spacing: -0.5px; }
    .subtitle { margin-top: 8px; color: var(--muted); font-size: 14px; font-weight: 300; }
    .card { width: 100%; max-width: 580px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px 28px 24px; margin-bottom: 20px; }
    label.lbl { display: block; font-size: 11px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    input[type="text"], textarea { width: 100%; background: #111; border: 1px solid var(--border); border-radius: 10px; padding: 13px 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); outline: none; transition: border-color 0.2s; }
    input[type="text"]:focus, textarea:focus { border-color: var(--red); }
    input[type="text"]::placeholder { color: var(--subtle); }
    .field { margin-bottom: 16px; }
    .btn-primary { width: 100%; padding: 14px; margin-top: 4px; background: var(--red); color: #fff; border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary:hover:not(:disabled) { background: var(--red-dark); }
    .btn-primary:active:not(:disabled) { transform: scale(0.99); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
    .preview { width: 100%; max-width: 580px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; margin-bottom: 20px; animation: fadeUp 0.35s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .preview-header { padding: 16px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
    .preview-header-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); }
    .preview-header-lbl { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); font-weight: 500; }
    .pin-layout { display: flex; }
    .pin-img { width: 190px; flex-shrink: 0; background: #111; overflow: hidden; min-height: 180px; }
    .pin-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .pin-img-placeholder { width: 100%; height: 180px; display: flex; align-items: center; justify-content: center; color: var(--border); font-size: 13px; }
    .pin-info { flex: 1; padding: 22px; display: flex; flex-direction: column; gap: 10px; }
    .pin-brand { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--subtle); }
    .pin-title { font-family: 'Playfair Display', serif; font-size: 17px; color: var(--text); line-height: 1.3; }
    .pin-price { font-size: 20px; font-weight: 500; color: var(--red); }
    .pin-desc { font-size: 13px; color: var(--muted); line-height: 1.6; }
    .pin-source { font-size: 11px; color: var(--subtle); margin-top: auto; }
    .preview-actions { padding: 18px 22px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
    .btn-open {
      flex: 1; padding: 13px; background: var(--red); color: #fff; border: none;
      border-radius: 9px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background 0.2s; text-decoration: none;
    }
    .btn-open:hover { background: var(--red-dark); }
    .btn-reset { padding: 13px 16px; background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 9px; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
    .btn-reset:hover { border-color: var(--subtle); color: #888; }
    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 8px; animation: slideUp 0.3s ease; z-index: 99; white-space: nowrap; }
    @keyframes slideUp { from { opacity:0; transform:translate(-50%, 12px); } to { opacity:1; transform:translate(-50%, 0); } }
    .toast.error { background: #2b0d12; color: #ff6b7a; border: 1px solid #4a1a22; }
    .toast.info { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }
    .spin { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-state { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 40px 0; color: var(--muted); font-size: 14px; }
    .loading-state .spin { width: 28px; height: 28px; border-color: var(--border); border-top-color: var(--red); }
    .edit-toggle { background: none; border: none; color: var(--subtle); font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; gap: 4px; padding: 10px 22px; transition: color 0.2s; }
    .edit-toggle:hover { color: #888; }
    .edit-panel { padding: 0 22px 18px; border-top: 1px solid var(--border); }
    .edit-inner { padding-top: 18px; display: flex; flex-direction: column; gap: 12px; }
    .edit-inner textarea { resize: vertical; min-height: 72px; background: #111; border: 1px solid var(--border); border-radius: 10px; padding: 13px 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); outline: none; }
    .edit-inner textarea:focus { border-color: var(--red); }
    .hint { font-size: 12px; color: var(--subtle); margin-top: 10px; text-align: center; }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">
    <span class="logo-amz">amazon</span>
    <span class="logo-arrow">→</span>
    <div class="logo-p">P</div>
  </div>
  <h1>Amazon → Pinterest</h1>
  <p class="subtitle">Extract product details and open Pinterest pre-filled</p>
</div>

<div class="card" id="formCard">
  <div class="field">
    <label class="lbl">Amazon Product URL</label>
    <input type="text" id="amazonUrl" placeholder="https://www.amazon.com/dp/... or amzn.to/..." />
  </div>
  <button class="btn-primary" id="extractBtn">Extract & Preview Pin →</button>
</div>

<div id="loadingState" style="display:none;">
  <div class="loading-state">
    <div class="spin"></div>
    <span>Extracting product details…</span>
  </div>
</div>

<div class="preview" id="previewCard" style="display:none;">
  <div class="preview-header">
    <div class="preview-header-dot"></div>
    <span class="preview-header-lbl">Pin Preview</span>
  </div>
  <div class="pin-layout">
    <div class="pin-img" id="pinImgCol">
      <div class="pin-img-placeholder" id="pinImgPlaceholder">No image</div>
    </div>
    <div class="pin-info">
      <div class="pin-brand" id="pinBrand" style="display:none;"></div>
      <div class="pin-title" id="pinTitle"></div>
      <div class="pin-price" id="pinPrice" style="display:none;"></div>
      <div class="pin-desc" id="pinDesc"></div>
      <div class="pin-source">🔗 amazon.com</div>
    </div>
  </div>

  <button class="edit-toggle" id="editToggle">✏️ Edit details</button>
  <div class="edit-panel" id="editPanel" style="display:none;">
    <div class="edit-inner">
      <div class="field"><label class="lbl">Title</label><input type="text" id="editTitle" /></div>
      <div class="field"><label class="lbl">Price</label><input type="text" id="editPrice" /></div>
      <div class="field"><label class="lbl">Description</label><textarea id="editDesc" rows="3"></textarea></div>
      <div class="field"><label class="lbl">Image URL</label><input type="text" id="editImage" /></div>
    </div>
  </div>

  <div class="preview-actions">
    <a class="btn-open" id="pinterestBtn" href="#" target="_blank" rel="noopener noreferrer">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="white"><path d="M12 0C5.373 0 0 5.373 0 12c0 5.084 3.163 9.426 7.627 11.174-.105-.949-.2-2.405.042-3.441.218-.937 1.407-5.965 1.407-5.965s-.359-.719-.359-1.782c0-1.668.967-2.914 2.171-2.914 1.023 0 1.518.769 1.518 1.69 0 1.029-.655 2.568-.994 3.995-.283 1.194.599 2.169 1.777 2.169 2.133 0 3.772-2.249 3.772-5.495 0-2.873-2.064-4.882-5.012-4.882-3.414 0-5.418 2.561-5.418 5.207 0 1.031.397 2.138.893 2.738.098.119.112.224.083.345l-.333 1.36c-.053.22-.174.267-.402.161-1.499-.698-2.436-2.889-2.436-4.649 0-3.785 2.75-7.262 7.929-7.262 4.163 0 7.398 2.967 7.398 6.931 0 4.136-2.607 7.464-6.227 7.464-1.216 0-2.359-.632-2.75-1.378l-.748 2.853c-.271 1.043-1.002 2.35-1.492 3.146C9.57 23.812 10.763 24 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0z"/></svg>
      Open in Pinterest
    </a>
    <button class="btn-reset" id="resetBtn">↩ Reset</button>
  </div>
  <p class="hint" style="padding-bottom:16px;">Pinterest will open pre-filled — just click Save ✓</p>
</div>

<div class="toast" id="toast" style="display:none;"></div>

<script>
  let product = null;
  let showEdit = false;

  document.getElementById('extractBtn').addEventListener('click', extractProduct);
  document.getElementById('amazonUrl').addEventListener('keydown', e => { if (e.key === 'Enter') extractProduct(); });

  async function extractProduct() {
    const url = document.getElementById('amazonUrl').value.trim();
    if (!url) return;
    show('formCard', false);
    show('loadingState', true);
    try {
      const r = await fetch('/api/extract', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ amazonUrl: url }),
      }).then(res => res.json());
      if (r.error) throw new Error(r.error);
      product = { ...r.product, amazonUrl: url };
      renderPreview();
      show('loadingState', false);
      show('previewCard', true);
    } catch (e) {
      show('loadingState', false);
      show('formCard', true);
      showToast('❌ ' + (e.message || 'Could not extract product details'), 'error');
    }
  }

  function getPinterestUrl() {
    if (!product) return '#';
    const desc = `${product.title}${product.price ? ' — ' + product.price : ''}. ${product.description}`;
    const params = new URLSearchParams({ url: product.amazonUrl, description: desc });
    if (product.imageUrl) params.set('media', product.imageUrl);
    return `https://www.pinterest.com/pin/create/button/?${params.toString()}`;
  }

  function renderPreview() {
    document.getElementById('pinTitle').textContent = product.title || '';
    document.getElementById('pinDesc').textContent = product.description || '';
    const price = document.getElementById('pinPrice');
    if (product.price) { price.textContent = product.price; price.style.display = ''; } else price.style.display = 'none';
    const brand = document.getElementById('pinBrand');
    if (product.brand) { brand.textContent = product.brand; brand.style.display = ''; } else brand.style.display = 'none';
    const imgCol = document.getElementById('pinImgCol');
    const placeholder = document.getElementById('pinImgPlaceholder');
    if (product.imageUrl) {
      let img = imgCol.querySelector('img');
      if (!img) { img = document.createElement('img'); imgCol.appendChild(img); }
      img.src = product.imageUrl; img.alt = product.title; img.style.display = '';
      placeholder.style.display = 'none';
    } else {
      const img = imgCol.querySelector('img');
      if (img) img.style.display = 'none';
      placeholder.style.display = '';
    }
    document.getElementById('editTitle').value = product.title || '';
    document.getElementById('editPrice').value = product.price || '';
    document.getElementById('editDesc').value = product.description || '';
    document.getElementById('editImage').value = product.imageUrl || '';
    document.getElementById('pinterestBtn').href = getPinterestUrl();
  }

  document.getElementById('editToggle').addEventListener('click', () => {
    showEdit = !showEdit;
    document.getElementById('editPanel').style.display = showEdit ? 'block' : 'none';
    document.getElementById('editToggle').textContent = showEdit ? '▲ Hide editor' : '✏️ Edit details';
  });

  ['editTitle','editPrice','editDesc','editImage'].forEach(id => {
    document.getElementById(id).addEventListener('input', e => {
      const map = { editTitle: 'title', editPrice: 'price', editDesc: 'description', editImage: 'imageUrl' };
      product[map[id]] = e.target.value;
      renderPreview();
      document.getElementById('pinterestBtn').href = getPinterestUrl();
    });
  });

  document.getElementById('resetBtn').addEventListener('click', reset);

  function reset() {
    product = null; showEdit = false;
    document.getElementById('amazonUrl').value = '';
    document.getElementById('editPanel').style.display = 'none';
    document.getElementById('editToggle').textContent = '✏️ Edit details';
    show('previewCard', false); show('formCard', true);
  }

  function show(id, visible) { document.getElementById(id).style.display = visible ? '' : 'none'; }

  let toastTimer;
  function showToast(msg, type = 'info') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast ${type}`; t.style.display = 'flex';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.style.display = 'none'; }, 4000);
  }
</script>
</body>
</html>
