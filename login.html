<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Amazon → Pinterest Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#f0ede8;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{width:100%;max-width:380px;text-align:center}
.logo{width:56px;height:56px;border-radius:50%;background:#e60023;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff;font-family:Georgia,serif;margin:0 auto 20px}
h1{font-family:'Playfair Display',serif;font-size:28px;font-weight:400;margin-bottom:6px}
.sub{color:#555;font-size:13px;margin-bottom:36px}
.card{background:#141414;border:1px solid #2a2a2a;border-radius:16px;padding:28px}
label{display:block;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#555;margin-bottom:8px;text-align:left}
input{width:100%;background:#0f0f0f;border:1px solid #2a2a2a;border-radius:10px;padding:14px 16px;font-family:'DM Sans',sans-serif;font-size:16px;color:#f0ede8;outline:none;transition:border-color 0.2s;margin-bottom:16px;letter-spacing:3px;text-align:center}
input:focus{border-color:#e60023}
input::placeholder{letter-spacing:0;color:#444;font-size:14px}
button{width:100%;padding:15px;background:#e60023;color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:background 0.2s}
button:hover{background:#cc0020}
button:disabled{opacity:0.5;cursor:not-allowed}
.err{color:#ff6b7a;font-size:13px;margin-top:12px;display:none}
.hint{color:#333;font-size:11px;margin-top:20px}
</style>
</head>
<body>
<div class="box">
  <div class="logo">P</div>
  <h1>Amazon → Pinterest</h1>
  <p class="sub">Personal pin management tool</p>
  <div class="card">
    <label>Password</label>
    <input type="password" id="pwd" placeholder="Enter your password" autofocus onkeydown="if(event.key==='Enter')login()"/>
    <button id="btn" onclick="login()">Unlock →</button>
    <div class="err" id="err">Wrong password. Try again.</div>
  </div>
  <p class="hint">Private tool — authorised access only</p>
</div>
<script>
async function login(){
  var pwd=document.getElementById('pwd').value;
  if(!pwd) return;
  var btn=document.getElementById('btn');
  btn.disabled=true; btn.textContent='Checking…';
  try{
    var r=await fetch('/auth/app-login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pwd})}).then(function(x){return x.json();});
    if(r.ok){ window.location.href='/'; }
    else{ document.getElementById('err').style.display='block'; btn.disabled=false; btn.textContent='Unlock →'; document.getElementById('pwd').value=''; document.getElementById('pwd').focus(); }
  }catch(e){ btn.disabled=false; btn.textContent='Unlock →'; }
}
</script>
</body>
</html>
